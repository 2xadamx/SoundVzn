<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <rect width="512" height="512" rx="128" fill="#050505" />
    
    <!-- Outer Ring -->
    <circle cx="256" cy="256" r="180" stroke="url(#cyber-gradient)" stroke-width="12" stroke-linecap="round" stroke-dasharray="80 40 20 40" filter="url(#glow)" transform="rotate(45 256 256)" opacity="0.8"/>
    
    <!-- Sound Waves -->
    <path d="M180 256L220 180L256 320L292 200L332 256" stroke="url(#cyber-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    
    <!-- Central Pulse -->
    <circle cx="256" cy="256" r="30" fill="url(#cyber-gradient)" filter="url(#glow)" opacity="0.9" />
</svg>
